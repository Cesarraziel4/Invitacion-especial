<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¿Quieres salir conmigo? 🎀🏎️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Aquí se carga tu imagen de fondo */
            background-image: url('fondo.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        /* Capa de fondo oscura opcional por si tu imagen es demasiado clara */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.1); /* Oscurece un 10% el fondo para resaltar la tarjeta */
            z-index: 1;
        }

        /* Contenedor principal estilizado con alto contraste */
        .card {
            background-color: rgba(255, 255, 255, 0.93); /* Fondo blanco con ligera transparencia */
            backdrop-filter: blur(5px); /* Efecto difuminado moderno detrás de la tarjeta */
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 5px dashed #ff1493; /* Rosa fuerte de Hello Kitty */
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 2; /* Se posiciona encima del fondo */
            transition: all 0.3s ease;
        }

        /* Emojis con sombra para que resalten */
        .decoraciones {
            font-size: 2.3rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.1));
        }

        /* Letras principales en un tono rosa fuerte de alta legibilidad */
        h1 {
            color: #d80073; 
            font-size: 1.8rem;
            margin-bottom: 35px;
            line-height: 1.4;
            font-weight: 900;
        }

        .botones-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            height: 60px;
            position: relative;
            align-items: center;
            width: 100%;
        }

        .btn {
            padding: 14px 35px;
            font-size: 1.25rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            user-select: none;
        }

        /* Botón SÍ con contraste ultra alto */
        #btn-si {
            background-color: #ff1493; /* Rosa encendido */
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }

        #btn-si:hover {
            background-color: #c71585;
            transform: scale(1.12);
        }

        /* Botón NO */
        #btn-no {
            background-color: #707070; /* Gris más oscuro para que se lea perfecto */
            color: white;
            z-index: 999;
            transition: all 0.1s ease-out;
        }

        /* Pantalla final de éxito */
        .oculto {
            display: none !important;
        }

        .mensaje-exito h2 {
            color: #d80073;
            font-size: 2.3rem;
            margin-bottom: 15px;
            font-weight: 900;
        }

        /* Animación Kitty Go Kart */
        .kart-animation {
            font-size: 4.8rem;
            animation: drive 1.2s infinite linear;
            margin-bottom: 15px;
            display: inline-block;
        }

        @keyframes drive {
            0% { transform: translateX(-8px) scale(1); }
            50% { transform: translateX(8px) scale(1.05); }
            100% { transform: translateX(-8px) scale(1); }
        }

        /* Ajustes de optimización para pantallas de celulares pequeños */
        @media (max-width: 375px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 1.5rem; margin-bottom: 25px; }
            .btn { padding: 12px 28px; font-size: 1.15rem; }
            .decoraciones { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Elemento de audio local para reproducir Volando Remix -->
    <audio id="musica-cita" loop>
        <source src="volando.mp3" type="audio/mpeg">
    </audio>

    <!-- PANTALLA 1: La Pregunta -->
    <div class="card" id="propuesta">
        <div class="decoraciones">🐱🎀🏋️‍♀️🏁🏎️</div>
        <h1>Vamos a salir este sábado<br>¿Qué dices?</h1>
        
        <div class="botones-container">
            <button class="btn" id="btn-si">Sí</button>
            <button class="btn" id="btn-no">No</button>
        </div>
    </div>

    <!-- PANTALLA 2: Éxito total -->
    <div class="card oculto" id="exito">
        <div class="kart-animation">🐱🏎️💨✨</div>
        <div class="mensaje-exito">
            <h2>¡Tenemos una cita!</h2>
            <p style="color: #ff1493; font-size: 1.25rem; font-weight: bold; margin-top: 10px;">
                ¡Prepara los tenis! 🏋️‍♀️🏁<br>Nos vemos el sábado. 😉
            </p>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const propuestaDiv = document.getElementById('propuesta');
        const exitoDiv = document.getElementById('exito');
        const musica = document.getElementById('musica-cita');

        // Función responsiva para mover el botón No por la pantalla
        function huirBotonNo() {
            const btnWidth = btnNo.offsetWidth;
            const btnHeight = btnNo.offsetHeight;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const padding = 25; // Margen para que no se pegue a las esquinas físicas del teléfono

            const randomX = Math.floor(Math.random() * (windowWidth - btnWidth - (padding * 2))) + padding;
            const randomY = Math.floor(Math.random() * (windowHeight - btnHeight - (padding * 2))) + padding;

            btnNo.style.position = 'fixed';
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        /* Captura de interacciones en PC y Móvil */
        btnNo.addEventListener('mouseenter', huirBotonNo);
        btnNo.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Detiene el click real en pantallas táctiles
            huirBotonNo();
        });
        btnNo.addEventListener('click', function(e) {
            e.preventDefault();
            huirBotonNo();
        });

        /* Acción del botón SÍ */
        btnSi.addEventListener('click', () => {
            propuestaDiv.classList.add('oculto');
            exitoDiv.removeProperty; // Seguridad de renderizado
            exitoDiv.classList.remove('oculto');
            
            // Reproducción de la canción local "volando.mp3"
            musica.play().catch(error => {
                console.log("Audio en espera de carga del archivo local:", error);
            });
        });
    </script>
</body>
</html>
