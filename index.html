<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¿Quieres salir conmigo? 🎀🏎️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe4e1; /* Rosa pastel */
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden;
            /* Fondo con patrón de estrellas/puntos cute */
            background-image: radial-gradient(#ffb6c1 20%, transparent 20%),
                              radial-gradient(#ffb6c1 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            padding: 20px;
        }

        /* Contenedor principal estilo Kitty Racing Team */
        .card {
            background-color: rgba(255, 255, 255, 0.96);
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 12px 35px rgba(255, 20, 147, 0.25);
            text-align: center;
            border: 5px dashed #ff69b4; /* Borde divertido */
            width: 100%;
            max-width: 430px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Emojis combinados: Kitty, Gym y Go Karts */
        .decoraciones {
            font-size: 2.2rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        h1 {
            color: #ff1493;
            font-size: 1.7rem;
            margin-bottom: 35px;
            line-height: 1.4;
            font-weight: bold;
            text-shadow: 1px 1px 0px #fff;
        }

        .botones-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            height: 60px;
            position: relative;
            align-items: center;
            width: 100%;
        }

        .btn {
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 105, 180, 0.3);
            user-select: none;
        }

        #btn-si {
            background-color: #ff69b4;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
        }

        #btn-si:hover {
            background-color: #ff1493;
            transform: scale(1.15);
        }

        #btn-no {
            background-color: #b0b0b0;
            color: white;
            z-index: 999;
            transition: all 0.12s ease-out;
        }

        /* Pantalla final */
        .oculto {
            display: none !important;
        }

        .mensaje-exito h2 {
            color: #ff1493;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        /* Animación del Go Kart de Kitty */
        .kart-animation {
            font-size: 4.5rem;
            animation: drive 1.5s infinite linear;
            margin-bottom: 15px;
            display: inline-block;
        }

        @keyframes drive {
            0% { transform: translateX(-10px) rotate(0deg); }
            50% { transform: translateX(10px) rotate(3deg); }
            100% { transform: translateX(-10px) rotate(0deg); }
        }

        @media (max-width: 360px) {
            .card { padding: 30px 15px; }
            h1 { font-size: 1.4rem; }
            .btn { padding: 12px 28px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <audio id="musica-cita" loop prefetch>
        <source src="https://openwhyd.org/u/53b26639c4aa029f60bfb37f/playlist/0?format=mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"> 
        </audio>

    <div class="card" id="propuesta">
        <div class="decoraciones">🐱🎀🏋️‍♀️🏁🏎️</div>
        <h1>Vamos a salir este sábado<br>¿Qué dices?</h1>
        
        <div class="botones-container">
            <button class="btn" id="btn-si">Sí</button>
            <button class="btn" id="btn-no">No</button>
        </div>
    </div>

    <div class="card oculto" id="exito">
        <div class="kart-animation">🐱🏎️💨✨</div>
        <div class="mensaje-exito">
            <h2>¡Tenemos una cita!</h2>
            <p style="color: #ff69b4; font-size: 1.2rem; font-weight: bold; margin-top: 10px;">
                ¡Prepara los tenis! 🏋️‍♀️🏁<br>Nos vemos el sábado. 😉
            </p>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnSi = document.getElementById('btn-si');
        const propuestaDiv = document.getElementById('propuesta');
        const exitoDiv = document.getElementById('exito');
        const musica = document.getElementById('musica-cita');

        // Función para mover el botón "No" de forma aleatoria por la pantalla
        function huirBotonNo() {
            const btnWidth = btnNo.offsetWidth;
            const btnHeight = btnNo.offsetHeight;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const padding = 25;

            const randomX = Math.floor(Math.random() * (windowWidth - btnWidth - (padding * 2))) + padding;
            const randomY = Math.floor(Math.random() * (windowHeight - btnHeight - (padding * 2))) + padding;

            btnNo.style.position = 'fixed';
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        /* Eventos de evasión */
        btnNo.addEventListener('mouseenter', huirBotonNo);
        btnNo.addEventListener('touchstart', function(e) {
            e.preventDefault();
            huirBotonNo();
        });
        btnNo.addEventListener('click', function(e) {
            e.preventDefault();
            huirBotonNo();
        });

        /* Evento al presionar SÍ (Acción y Música) */
        btnSi.addEventListener('click', () => {
            // 1. Intercambiar pantallas
            propuestaDiv.classList.add('oculto');
            exitoDiv.classList.remove('oculto');
            
            // 2. Reproducir música (Los navegadores modernos solo permiten reproducir audio tras una interacción como este click)
            musica.play().catch(error => {
                console.log("La reproducción automática fue bloqueada o cargando: ", error);
            });
        });
    </script>
</body>
</html>
